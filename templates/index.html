<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CIS Portal — Instruct Construction Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #D4463E;
      --red-deep: #B8392F;
      --red-glow: rgba(212, 70, 62, 0.45);
      --ink: #0F0F12;
      --muted: #6b6b73;
      --line: rgba(15, 15, 18, 0.06);
      --glass: rgba(255, 255, 255, 0.72);
      --glass-strong: rgba(255, 255, 255, 0.85);
      --shadow-sm: 0 1px 2px rgba(15,15,18,0.04), 0 2px 6px rgba(15,15,18,0.04);
      --shadow-md: 0 2px 4px rgba(15,15,18,0.04), 0 12px 28px rgba(15,15,18,0.07);
      --shadow-lg: 0 4px 8px rgba(15,15,18,0.04), 0 24px 48px rgba(15,15,18,0.10);
      --shadow-red: 0 8px 24px rgba(212,70,62,0.32);
    }

    html, body { min-height: 100%; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background: #fafaf8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      letter-spacing: -0.01em;
    }

    /* ── Ambient background ── */
    body::before, body::after {
      content: "";
      position: fixed; pointer-events: none; z-index: 0;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.55;
      animation: drift 22s ease-in-out infinite alternate;
    }
    body::before {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(212,70,62,0.45) 0%, rgba(212,70,62,0) 70%);
      top: -180px; right: -100px;
    }
    body::after {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(255,180,120,0.35) 0%, rgba(255,180,120,0) 70%);
      bottom: -160px; left: -120px;
      animation-delay: -8s;
    }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(40px,30px) scale(1.08); }
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(15,15,18,0.78);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      color: white; height: 64px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.95rem; color: white;
      letter-spacing: -0.5px;
      box-shadow: 0 4px 14px var(--red-glow), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .header-text h1 { font-size: 0.92rem; font-weight: 700; letter-spacing: -0.2px; }
    .header-text p { font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-top: 1px; font-weight: 400; }
    header a {
      color: rgba(255,255,255,0.65); font-size: 0.78rem; text-decoration: none;
      padding: 7px 14px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      font-weight: 500; transition: all 0.2s ease;
    }
    header a:hover { color: white; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }

    /* ── Layout ── */
    .container { position: relative; z-index: 1; max-width: 820px; margin: 36px auto; padding: 0 22px 80px; }

    /* ── Glass cards ── */
    .card {
      background: var(--glass);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 18px;
      padding: 26px 28px;
      margin-bottom: 18px;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.6);
      animation: rise 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.10s; }

    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .step-badge {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
      color: white; border-radius: 9px;
      font-size: 0.74rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px var(--red-glow), inset 0 1px 0 rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    .step-badge.dark {
      background: linear-gradient(135deg, #2a2a30 0%, #0F0F12 100%);
      box-shadow: 0 4px 10px rgba(15,15,18,0.18), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .card-header h2 { font-size: 0.98rem; font-weight: 600; color: var(--ink); letter-spacing: -0.2px; }

    /* ── Inputs ── */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; padding: 13px 46px 13px 18px;
      font-size: 0.95rem; font-family: inherit; color: var(--ink);
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(15,15,18,0.08);
      border-radius: 12px; outline: none;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }
    .search-wrap input::placeholder { color: #a3a3aa; }
    .search-wrap input:focus {
      border-color: var(--red);
      background: white;
      box-shadow: 0 0 0 4px rgba(212,70,62,0.12);
    }
    .search-icon {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      color: #c0c0c5; font-size: 1rem; pointer-events: none;
    }

    #suggestions {
      display: none; margin-top: 8px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(15,15,18,0.06);
      border-radius: 12px; overflow: hidden;
      box-shadow: var(--shadow-md);
      animation: rise 0.2s ease both;
    }
    .suggestion {
      padding: 12px 18px; cursor: pointer; font-size: 0.92rem; color: #1a1a1f;
      border-bottom: 1px solid rgba(15,15,18,0.04);
      transition: all 0.12s ease;
    }
    .suggestion:last-child { border-bottom: none; }
    .suggestion:hover { background: rgba(212,70,62,0.06); color: var(--red); padding-left: 22px; }

    #selected-contact {
      display: none; margin-top: 12px;
      padding: 10px 16px;
      background: linear-gradient(135deg, rgba(212,70,62,0.08), rgba(212,70,62,0.04));
      border: 1px solid rgba(212,70,62,0.18);
      border-radius: 10px;
      font-size: 0.86rem; color: var(--red-deep); font-weight: 500;
      animation: rise 0.3s ease both;
    }

    .period-row { display: flex; gap: 10px; }
    .period-row select {
      flex: 1; padding: 12px 16px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(15,15,18,0.08);
      border-radius: 12px; outline: none;
      font-size: 0.92rem; font-family: inherit; color: var(--ink);
      cursor: pointer; transition: all 0.2s ease;
      appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'%3e%3cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236b6b73' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 16px center;
      padding-right: 38px;
    }
    .period-row select:focus {
      border-color: var(--red); background-color: white;
      box-shadow: 0 0 0 4px rgba(212,70,62,0.12);
    }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 10px; margin-top: 18px; }
    .btn {
      flex: 1; padding: 13px 18px;
      border: none; border-radius: 12px;
      font-size: 0.92rem; font-weight: 600; font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      letter-spacing: -0.1px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
      box-shadow: var(--shadow-red), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(212,70,62,0.42), inset 0 1px 0 rgba(255,255,255,0.22);
    }
    .btn-primary:disabled {
      background: linear-gradient(135deg, #e5e5ea 0%, #d8d8de 100%);
      color: #b0b0b8; cursor: not-allowed; box-shadow: none;
    }
    .btn-secondary {
      color: white;
      background: linear-gradient(135deg, #2a2a30 0%, #0F0F12 100%);
      box-shadow: 0 6px 18px rgba(15,15,18,0.18), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn-secondary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(15,15,18,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .btn-secondary:disabled {
      background: #d0d0d6; color: #909098; cursor: not-allowed; box-shadow: none;
    }

    #status { margin-top: 14px; font-size: 0.84rem; text-align: center; color: var(--muted); min-height: 18px; font-weight: 500; }
    .err { color: var(--red) !important; }

    /* ── Summary grid ── */
    #result-card { display: none; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
    .summary-box {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(15,15,18,0.05);
      border-radius: 14px; padding: 16px 18px;
      transition: transform 0.2s ease;
    }
    .summary-box:hover { transform: translateY(-2px); }
    .summary-box .lbl {
      font-size: 0.7rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 6px; font-weight: 600;
    }
    .summary-box .val {
      font-size: 1.4rem; font-weight: 700; color: var(--ink);
      letter-spacing: -0.5px; font-variant-numeric: tabular-nums;
    }
    .summary-box.deducted {
      background: linear-gradient(135deg, rgba(212,70,62,0.08), rgba(212,70,62,0.03));
      border-color: rgba(212,70,62,0.15);
    }
    .summary-box.deducted .val { color: var(--red); }
    .summary-box.net {
      background: linear-gradient(135deg, rgba(34,197,94,0.10), rgba(34,197,94,0.03));
      border-color: rgba(34,197,94,0.18);
    }
    .summary-box.net .val { color: #15803d; }

    /* ── Tables ── */
    .table-wrap {
      overflow-x: auto; margin-bottom: 20px;
      border-radius: 14px;
      border: 1px solid rgba(15,15,18,0.06);
      background: rgba(255,255,255,0.5);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    thead th {
      background: rgba(15,15,18,0.04);
      color: var(--muted);
      padding: 11px 16px; text-align: left;
      font-weight: 600; font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap;
      border-bottom: 1px solid rgba(15,15,18,0.06);
    }
    td { padding: 12px 16px; border-bottom: 1px solid rgba(15,15,18,0.04); color: #2a2a30; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s ease; }
    tbody tr:hover { background: rgba(212,70,62,0.025); }
    td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }

    /* ── Action row ── */
    .action-row { display: flex; gap: 10px; }
    .btn-download, .btn-whatsapp {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      padding: 13px 18px; border: none; border-radius: 12px;
      font-size: 0.92rem; font-weight: 600; font-family: inherit;
      cursor: pointer; text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-download {
      background: linear-gradient(135deg, #2a2a30 0%, #0F0F12 100%);
      color: white;
      box-shadow: 0 6px 18px rgba(15,15,18,0.22), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(15,15,18,0.28), inset 0 1px 0 rgba(255,255,255,0.14);
    }
    .btn-whatsapp {
      background: linear-gradient(135deg, #25D366 0%, #1eb858 100%);
      color: white;
      box-shadow: 0 6px 18px rgba(37,211,102,0.32), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .btn-whatsapp:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(37,211,102,0.42), inset 0 1px 0 rgba(255,255,255,0.22);
    }

    /* ── All periods ── */
    #all-card { display: none; }
    #all-table tfoot td {
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
      color: white; font-weight: 700; font-size: 0.88rem;
      border-bottom: none;
    }
    #all-table tfoot td:first-child { border-radius: 0 0 0 14px; }
    #all-table tfoot td:last-child { border-radius: 0 0 14px 0; }

    .pill-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 11px; border-radius: 8px;
      font-size: 0.75rem; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none;
      font-family: inherit; transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .pill-btn:hover { transform: translateY(-1px); }
    .pill-pdf {
      background: linear-gradient(135deg, #2a2a30 0%, #0F0F12 100%);
      color: white; box-shadow: 0 2px 6px rgba(15,15,18,0.2);
    }
    .pill-wa {
      background: linear-gradient(135deg, #25D366 0%, #1eb858 100%);
      color: white; margin-left: 6px;
      box-shadow: 0 2px 6px rgba(37,211,102,0.28);
    }

    #no-data {
      text-align: center; padding: 36px; color: #a8a8b0;
      font-size: 0.92rem; display: none;
    }

    /* ── Spinner ── */
    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      header { padding: 0 16px; height: 60px; }
      .header-text h1 { font-size: 0.86rem; }
      .header-text p { font-size: 0.68rem; }
      .container { margin: 22px auto; padding: 0 14px 50px; }
      .card { padding: 22px 20px; border-radius: 16px; }
      .summary-box .val { font-size: 1.2rem; }
      .btn-row, .action-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="header-logo">IC</div>
    <div class="header-text">
      <h1>Instruct Construction Group</h1>
      <p>CIS Statement Portal · {{ org }}</p>
    </div>
  </div>
  <a href="/disconnect">Disconnect</a>
</header>

<div class="container">

  <!-- Step 1: Search -->
  <div class="card">
    <div class="card-header">
      <div class="step-badge">1</div>
      <h2>Search Subcontractor</h2>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Type a name to search…" autocomplete="off"/>
      <span class="search-icon">⌕</span>
    </div>
    <div id="suggestions"></div>
    <div id="selected-contact"></div>
  </div>

  <!-- Step 2: Period -->
  <div class="card">
    <div class="card-header">
      <div class="step-badge">2</div>
      <h2>Select CIS Period</h2>
    </div>
    <div class="period-row">
      <select id="month">
        <option value="01">January</option>
        <option value="02">February</option>
        <option value="03">March</option>
        <option value="04">April</option>
        <option value="05">May</option>
        <option value="06">June</option>
        <option value="07">July</option>
        <option value="08">August</option>
        <option value="09">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
      </select>
      <select id="year"></select>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="get-btn" disabled>Get Statement</button>
      <button class="btn btn-secondary" id="all-btn" disabled>All Periods</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- All Periods -->
  <div class="card" id="all-card">
    <div class="card-header">
      <div class="step-badge dark">≡</div>
      <h2 id="all-title"></h2>
    </div>
    <div class="table-wrap">
      <table id="all-table">
        <thead>
          <tr>
            <th>Period</th>
            <th>Gross</th>
            <th>CIS Deducted</th>
            <th>Net Paid</th>
            <th>Bills</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="all-body"></tbody>
        <tfoot id="all-foot"></tfoot>
      </table>
    </div>
  </div>

  <!-- Result -->
  <div class="card" id="result-card">
    <div class="card-header">
      <div class="step-badge dark">✓</div>
      <h2 id="result-title"></h2>
    </div>
    <div class="summary-grid" id="summary-grid"></div>
    <div class="table-wrap" id="detail-wrap" style="display:none">
      <table id="detail-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Ref</th>
            <th>Gross</th>
            <th>Materials</th>
            <th>Taxable</th>
            <th>CIS</th>
            <th>Net</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div id="no-data"></div>
    <div class="action-row">
      <a href="#" class="btn-download" id="download-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </a>
      <a href="#" class="btn-whatsapp" id="whatsapp-btn" onclick="shareWhatsApp(event)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
        Send via WhatsApp
      </a>
    </div>
  </div>

</div>

<script>
  const yearSel = document.getElementById("year");
  const now = new Date();
  for (let y = now.getFullYear(); y >= now.getFullYear() - 3; y--) {
    const o = document.createElement("option");
    o.value = y; o.textContent = y;
    yearSel.appendChild(o);
  }
  document.getElementById("month").value = String(now.getMonth() + 1).padStart(2, "0");

  let selectedContact = null;

  const searchEl = document.getElementById("search");
  const suggestionsEl = document.getElementById("suggestions");
  const selectedEl = document.getElementById("selected-contact");
  const getBtn = document.getElementById("get-btn");
  const allBtn = document.getElementById("all-btn");
  const statusEl = document.getElementById("status");

  let debounce;
  searchEl.addEventListener("input", () => {
    clearTimeout(debounce);
    const q = searchEl.value.trim();
    if (q.length < 2) { suggestionsEl.style.display = "none"; return; }
    debounce = setTimeout(() => {
      fetch("/search?q=" + encodeURIComponent(q))
        .then(r => r.json())
        .then(data => {
          if (!data.length) { suggestionsEl.style.display = "none"; return; }
          suggestionsEl.innerHTML = data.map(c =>
            `<div class="suggestion" data-id="${c.id}" data-name="${c.name}">${c.name}</div>`
          ).join("");
          suggestionsEl.style.display = "block";
        });
    }, 250);
  });

  suggestionsEl.addEventListener("click", e => {
    const el = e.target.closest(".suggestion");
    if (!el) return;
    selectedContact = { id: el.dataset.id, name: el.dataset.name };
    searchEl.value = el.dataset.name;
    suggestionsEl.style.display = "none";
    selectedEl.textContent = "✓  " + el.dataset.name + " selected";
    selectedEl.style.display = "block";
    getBtn.disabled = false;
    allBtn.disabled = false;
  });

  document.addEventListener("click", e => {
    if (!suggestionsEl.contains(e.target) && e.target !== searchEl)
      suggestionsEl.style.display = "none";
  });

  function setLoading(btn, label, loading) {
    if (loading) {
      btn.dataset.label = btn.textContent;
      btn.innerHTML = `<span class="spin"></span> ${label}`;
      btn.disabled = true;
    } else {
      btn.textContent = btn.dataset.label || label;
      btn.disabled = false;
    }
  }

  getBtn.addEventListener("click", () => {
    if (!selectedContact) return;
    const month = document.getElementById("month").value;
    const year = document.getElementById("year").value;
    setLoading(getBtn, "Fetching…", true);
    statusEl.textContent = "";
    statusEl.className = "";
    document.getElementById("all-card").style.display = "none";

    fetch(`/statement?contact_id=${selectedContact.id}&month=${month}&year=${year}`)
      .then(r => r.json())
      .then(data => {
        setLoading(getBtn, "Get Statement", false);
        if (data.error && !data.invoices) {
          statusEl.textContent = "Error: " + JSON.stringify(data.error);
          statusEl.className = "err";
          return;
        }
        renderResult(data, month, year);
      })
      .catch(() => {
        setLoading(getBtn, "Get Statement", false);
        statusEl.textContent = "Request failed.";
        statusEl.className = "err";
      });
  });

  allBtn.addEventListener("click", () => {
    if (!selectedContact) return;
    setLoading(allBtn, "Loading…", true);
    statusEl.textContent = "";
    statusEl.className = "";
    document.getElementById("result-card").style.display = "none";

    fetch(`/all-periods?contact_id=${selectedContact.id}`)
      .then(r => r.json())
      .then(data => {
        setLoading(allBtn, "All Periods", false);
        if (data.error && !data.periods) {
          statusEl.textContent = "Error: " + JSON.stringify(data.error);
          statusEl.className = "err";
          return;
        }
        renderAllPeriods(data);
      })
      .catch(() => {
        setLoading(allBtn, "All Periods", false);
        statusEl.textContent = "Request failed.";
        statusEl.className = "err";
      });
  });

  function renderAllPeriods(data) {
    const card = document.getElementById("all-card");
    card.style.display = "block";
    card.style.animation = "none"; void card.offsetWidth; card.style.animation = "rise 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)";
    card.scrollIntoView({ behavior: "smooth", block: "start" });
    document.getElementById("all-title").textContent = data.contact?.name || selectedContact.name;

    const periods = data.periods || [];
    if (!periods.length) {
      document.getElementById("all-body").innerHTML =
        '<tr><td colspan="6" style="text-align:center;padding:32px;color:#a8a8b0">No CIS data found.</td></tr>';
      document.getElementById("all-foot").innerHTML = "";
      return;
    }

    let grandGross = 0, grandCIS = 0, grandPaid = 0;
    document.getElementById("all-body").innerHTML = periods.map(p => {
      grandGross += p.total_gross;
      grandCIS += p.total_cis;
      grandPaid += p.total_paid;
      return `<tr>
        <td>${p.period_label}</td>
        <td class="num">${fmt(p.total_gross)}</td>
        <td class="num" style="color:var(--red)">${fmt(p.total_cis)}</td>
        <td class="num" style="color:#15803d">${fmt(p.total_paid)}</td>
        <td style="text-align:center">${p.invoice_count}</td>
        <td style="white-space:nowrap;text-align:right">
          <a href="/download?contact_id=${selectedContact.id}&month=${p.month}&year=${p.year}" class="pill-btn pill-pdf">PDF</a>
          <a href="#" onclick="shareWhatsAppPeriod(event,'${selectedContact.id}',${p.month},${p.year},'${p.period_label}','${(data.contact?.name||'').replace(/'/g,'')}',${p.total_gross},${p.total_cis},${p.total_paid})" class="pill-btn pill-wa">WhatsApp</a>
        </td>
      </tr>`;
    }).join("");

    document.getElementById("all-foot").innerHTML = `<tr>
      <td>Total · ${periods.length} period${periods.length !== 1 ? 's' : ''}</td>
      <td class="num">${fmt(grandGross)}</td>
      <td class="num">${fmt(grandCIS)}</td>
      <td class="num">${fmt(grandPaid)}</td>
      <td></td><td></td>
    </tr>`;
  }

  const monthNames = ["","January","February","March","April","May","June","July","August","September","October","November","December"];
  function fmt(n) { return "£" + (n||0).toLocaleString("en-GB", {minimumFractionDigits:2,maximumFractionDigits:2}); }

  function renderResult(data, month, year) {
    const card = document.getElementById("result-card");
    const noData = document.getElementById("no-data");
    const detailWrap = document.getElementById("detail-wrap");
    card.style.display = "block";
    card.style.animation = "none"; void card.offsetWidth; card.style.animation = "rise 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)";
    card.scrollIntoView({ behavior: "smooth", block: "start" });

    const periodLabel = data.period_label || `${monthNames[parseInt(month)]} ${year}`;
    document.getElementById("result-title").textContent =
      (data.contact?.name || selectedContact.name) + " — " + periodLabel;

    document.getElementById("download-btn").href =
      `/download?contact_id=${selectedContact.id}&month=${month}&year=${year}`;

    const invoices = data.invoices || [];
    if (!invoices.length) {
      document.getElementById("summary-grid").innerHTML = "";
      detailWrap.style.display = "none";
      noData.style.display = "block";
      noData.innerHTML = "No CIS payments found for this subcontractor in this period.";
      return;
    }

    noData.style.display = "none";
    const t = data.totals || {};

    document.getElementById("summary-grid").innerHTML = `
      <div class="summary-box"><div class="lbl">Gross Paid (excl VAT)</div><div class="val">${fmt(t.gross)}</div></div>
      <div class="summary-box"><div class="lbl">Liable to Deduction</div><div class="val">${fmt(t.liable)}</div></div>
      <div class="summary-box deducted"><div class="lbl">CIS Deducted</div><div class="val">${fmt(t.cis_deduction)}</div></div>
      <div class="summary-box net"><div class="lbl">Net Paid (A − B)</div><div class="val">${fmt(t.paid)}</div></div>
    `;

    document.getElementById("table-body").innerHTML = invoices.map(row => `<tr>
      <td>${row.payment_date}</td>
      <td>${row.reference || '—'}</td>
      <td class="num">${fmt(row.gross)}</td>
      <td class="num">${fmt(row.materials)}</td>
      <td class="num">${fmt(row.labour)}</td>
      <td class="num" style="color:var(--red)">${fmt(row.cis_deduction)}</td>
      <td class="num" style="color:#15803d">${fmt(row.paid)}</td>
    </tr>`).join("");
    detailWrap.style.display = "block";

    window._lastStatement = { data, month, year };
  }

  async function sharePDF(url, filename, name, period, gross, cis, paid) {
    try {
      const res = await fetch(url);
      const blob = await res.blob();
      const file = new File([blob], filename, { type: "application/pdf" });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: `CIS Statement - ${name}`,
          text: `CIS Statement for ${name}\nPeriod: ${period}\nGross: ${fmt(gross)} | CIS: ${fmt(cis)} | Paid: ${fmt(paid)}`,
        });
        return;
      }
      const downloadUrl = window.location.origin + url;
      const msg = `Hi ${name},\n\nPlease find your CIS Payment Deduction Statement:\n\n📋 Period: ${period}\n💷 Gross: ${fmt(gross)}\n🔻 CIS Deducted: ${fmt(cis)}\n✅ Net Paid: ${fmt(paid)}\n\nDownload: ${downloadUrl}\n\nInstruct Construction Group LTD`;
      window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
    } catch (err) {
      if (err.name !== "AbortError") alert("Share failed: " + err.message);
    }
  }

  function shareWhatsApp(e) {
    e.preventDefault();
    const d = window._lastStatement;
    if (!d) return;
    const t = d.data.totals || {};
    const name = d.data.contact?.name || selectedContact.name;
    const period = d.data.period_label || "";
    const url = document.getElementById("download-btn").getAttribute("href");
    const filename = `CIS_${name.replace(/\s/g,"_")}_${period.replace(/\s/g,"_")}.pdf`;
    sharePDF(url, filename, name, period, t.gross, t.cis_deduction, t.paid);
  }

  function shareWhatsAppPeriod(e, contactId, month, year, periodLabel, name, gross, cis, paid) {
    e.preventDefault();
    const url = `/download?contact_id=${contactId}&month=${month}&year=${year}`;
    const filename = `CIS_${name.replace(/\s/g,"_")}_${periodLabel.replace(/\s/g,"_")}.pdf`;
    sharePDF(url, filename, name, periodLabel, gross, cis, paid);
  }
</script>
</body>
