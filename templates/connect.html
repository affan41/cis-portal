<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CIS Portal — Connect Xero</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6f9; display: flex; flex-direction: column; min-height: 100vh; }
    header { background: #1a1a2e; color: white; padding: 18px 32px; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p { font-size: 0.82rem; opacity: 0.55; margin-top: 2px; }
    .center { flex: 1; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 14px; padding: 48px 44px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 420px; width: 100%; }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h2 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 10px; }
    p { color: #666; font-size: 0.93rem; line-height: 1.6; margin-bottom: 28px; }
    .btn { display: inline-block; background: #13B5EA; color: white; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-size: 1rem; font-weight: 600; transition: background 0.2s; }
    .btn:hover { background: #0ea3d4; }
    .note { font-size: 0.78rem; color: #aaa; margin-top: 18px; margin-bottom: 0; }
  </style>
</head>
<body>
<header>
  <h1>Instrcut Construction Group Ltd</h1>
  <p>CIS Statement Portal</p>
</header>
<div class="center">
  <div class="card">
    <div class="icon">🔗</div>
    <h2>Connect to Xero</h2>
    <p>Sign in with your Xero account to access CIS statements for your subcontractors directly.</p>
    <a href="/connect" class="btn">Connect Xero Account</a>
    <p class="note">You'll be taken to Xero to authorise access. Your credentials are never stored.</p>
  </div>
</div>
</body>
</html>
